<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>舒立鈣 - Pure Lab</title>
  <style>
    :root{--bg:#f8fdf7;--card:#fff;--text:#234030;--accent:#3f9d74;}
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);font-family: "PingFang TC", "Segoe UI", sans-serif;color:var(--text);}
    .wrap{max-width:1050px;margin:0 auto;padding:18px;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
    .box{background:var(--card);border:1px solid #deede3;border-radius:12px;padding:16px;}
    h1{margin-top:0;color:#1f583f;}
    h2{margin:12px 0 8px;color:#20724d;}
    p{margin:6px 0;line-height:1.5;}
    ul{margin:8px 0;padding-left:18px;}
    li{margin:5px 0;}
    .btn{display:inline-block;margin-top:12px;padding:10px 16px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;}
    @media(max-width:900px){.row{grid-template-columns:1fr;}}
    .img-placeholder{width:100%;height:0;padding-bottom:70%;background:#dff3e7;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#5f886f;font-size:1rem;text-align:center;}
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" style="text-decoration:none;color:#196449;font-weight:600;">← 回首頁</a>
    <div class="row">
      <div class="box">
        <h1>舒立鈣</h1>
        <p>主打功效：補鈣強骨、提升吸收、全齡適用。</p>
        <h2>成分</h2>
        <p>荷蘭甜菜根L型發酵乳酸鈣、日本碳酸鈣、五色蔬果SOD酵素、益生菌與初乳蛋白。</p>
        <h2>適用族群</h2>
        <ul>
          <li>銀髮族、停經後女性</li>
          <li>青少年成長期</li>
          <li>骨質保養需求者</li>
        </ul>
        <h2>購買方式</h2>
        <p>搜尋「舒立鈣」蝦皮或 LINE 團購，提升骨骼保養力。</p>
        <a class="btn" href="#">立即購買</a>
      </div>
      <div class="box">
        <div class="img-placeholder">產品圖片 Placeholder<br>舒立鈣</div>
      </div>
    </div>
  </div>
</body>
</html>
