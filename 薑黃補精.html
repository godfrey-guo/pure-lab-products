<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>御品薑黃補精</title>
    <style>
    :root { --bg:#f8f4e7;--text:#1f3f2d;--accent:#3f6d46;--muted:#5f6e61;--card:#ffffff; }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Segoe UI',sans-serif;}
    .wrap{max-width:1080px;margin:0 auto;padding:20px;}
    a.back{display:inline-block;margin-bottom:18px;color:var(--accent);font-weight:700;text-decoration:none;}
    .main{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
    .content{background:var(--card);border:2px solid #c9d5c2;border-radius:14px;padding:22px;}
    .title{font-size:clamp(30px,5vw,54px);line-height:1.1;margin:0 0 10px;font-weight:900;}
    .subtitle{font-size:1.05rem;color:var(--muted);margin:0 0 14px;}
    .section{margin-top:16px;}
    .section h2{margin:0 0 8px;font-size:1.05rem;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;}
    .section p,.section ul{margin:0;line-height:1.6;color:var(--text);}
    .section ul{padding-left:18px;margin-top:8px;}
    .section li{margin:6px 0;}
    .btn{display:inline-block;margin-top:16px;padding:10px 16px;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;text-decoration:none;}
    .photo{border:2px solid #c9d5c2;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#fff;}
    .photo img{width:100%;height:auto;display:block;}
    @media (max-width: 767px) {
      body{padding:0 12px;}
      .main{grid-template-columns:1fr;}
      .content{order:2;padding:16px;}
      .photo{order:1;margin-bottom:16px;}
      .title{font-size:clamp(24px,8vw,40px);}
      .subtitle{font-size:0.95rem;}
      .btn{padding:14px 18px;font-size:1.05rem;}
    }
    @media (min-width:768px) and (max-width:1023px) {
      .main{grid-template-columns:1fr 1fr;}
      .title{font-size:clamp(26px,5vw,48px);}
      .content{padding:18px;}
      .btn{padding:12px 16px;}
    }
    @media (min-width:1024px) {
      .main{grid-template-columns:1fr 1fr;}
      .content{padding:22px;}
      .title{font-size:clamp(30px,6vw,54px);}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 回首頁</a>
    <div class="main">
      <div class="content">
        <h1 class="title">御品薑黃補精</h1>
        <p class="subtitle">護肝抗氧化，外食族與應酬族首選</p>

        <div class="section">
          <h2>產品特點</h2>
          <p>結合微米薑黃素與朝鮮薊等成分，支持肝臟與消化。</p>
        </div>

        <div class="section">
          <h2>成分</h2>
          <ul><li>微米薑黃素</li><li>OPITAC穀胱甘肽</li><li>Saberry®余甘子</li><li>朝鮮薊萃取</li></ul>
        </div>

        <div class="section">
          <h2>適用族群</h2>
          <p>外食族、應酬多、熬夜族</p>
        </div>

        <div class="section">
          <h2>購買方式</h2>
          <p>請至蝦皮搜尋「純萃研製所 御品薑黃補精」，或私訊 LINE 諮詢訂購。</p>
        </div>
      </div>
      <div class="photo">
        <img src="薑黃-封面.png" alt="御品薑黃補精" />
      </div>
    </div>
  </div>
</body>
</html>
