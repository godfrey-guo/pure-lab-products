section.separator{margin-top:26px;border-top:1px solid #E8E4DC;padding-top:20px;color:#5F5F5F;font-size:0.93rem;}

.shopee-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.shopee-grid img{width:100%;height:auto;display:block;border-radius:12px;border:1px solid #EAE6DE;box-shadow:0 8px 18px rgba(44,44,44,.08);}
@media(max-width:767px){.shopee-grid{grid-template-columns:1fr;}}
@media(max-width:1024px){.product-page{grid-template-columns:1fr;}.product-hero{order:-1;width:100%;height:auto;}.product-hero img{width:100%;height:auto;}}
@media(max-width:767px){.grid{grid-template-columns:1fr;}.container{padding:14px 12px 22px;}.hero{padding:26px 16px 20px;}.card h2{font-size:1.25rem;}.hero h1{font-size:2rem;}}

.product-main ul{margin:0;padding-left:20px;line-height:1.7;color:#3C3C3C;}

.product-hero{background:transparent;border:0;border-radius:0;padding:0;display:flex;align-items:center;justify-content:center;height:100%;width:100%;}.product-hero img{width:100%;height:auto;max-width:none;border-radius:0;box-shadow:none;display:block;}
